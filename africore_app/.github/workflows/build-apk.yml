name: Build Africore APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2
          channel: stable

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Install dependencies
        working-directory: africore_app
        run: flutter pub get

      - name: Clean project
        working-directory: africore_app
        run: flutter clean

      - name: Build APK
        working-directory: africore_app
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: africore-apk
          path: africore_app/build/app/outputs/flutter-apk/app-release.apk
